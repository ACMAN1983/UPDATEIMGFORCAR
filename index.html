<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一類文明 - 截圖傳送控制台-2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 30px; width: 90%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center; }
        #capture-box { border: 1px solid #444; border-radius: 8px; padding: 25px; background: #0d1117; margin-bottom: 25px; transition: 0.3s; }
        h4 { color: #58a6ff; margin: 0 0 10px 0; letter-spacing: 1px; }
        .badge { background: #238636; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .info { font-size: 13px; color: #8b949e; line-height: 1.6; }
        button { background: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); border-radius: 6px; padding: 14px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2ea043; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #216e39; opacity: 0.6; cursor: not-allowed; }
        #status-log { margin-top: 20px; font-size: 14px; min-height: 20px; }
        .success { color: #3fb950; }
        .error { color: #f85149; }
    </style>
</head>
<body>

<div class="terminal">
    <div id="capture-box">
        <div class="badge">● SYSTEM READY</div>
        <h4>ACMAN1983 傳送終端</h4>
        <div class="info">
            目標系統：運營模組-車輛追蹤<br>
            傳送節點：Google Drive API<br>
            <span style="font-size: 10px; color: #444;">1Hkh4Sa8x2YtTKivHiKnFVZUHad2syVVO</span>
        </div>
    </div>

    <button id="mainBtn" onclick="initiateCapture()">🚀 執行全自動截圖傳送</button>
    <div id="status-log">等待指令...</div>
</div>

<script>
    /**
     * 配置區：請填入你的 GAS 部署網址 (需包含 /exec)
     */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkZbPWIFP5fozNNNBmfTGU2YQkJr0uh6TkAOSRFCzPchDGYnRl63Jw8y3_pA9BLTh8hg/exec";
    async function initiateCapture() {
        const btn = document.getElementById('mainBtn');
        const log = document.getElementById('status-log');
        const target = document.getElementById('capture-box');

        btn.disabled = true;
        log.className = '';
        log.innerText = "⏳ 正在轉換原子數據 (截圖中)...";

        try {
            // 1. 執行截圖
            const canvas = await html2canvas(target, { 
                backgroundColor: "#0d1117",
                scale: 2 // 高解析度
            });
            const base64Data = canvas.toDataURL("image/png");

            log.innerText = "🚀 穿梭傳送中 (Sending to Drive)...";

            // 2. 判斷環境並傳送
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                // GAS 內部環境
                google.script.run
                    .withSuccessHandler(res => handleSuccess(res))
                    .withFailureHandler(err => handleError(err))
                    .saveScreenshot(base64Data, generateFileName());
            } else {
                // GitHub / 外部環境 (使用 Fetch POST)
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors", // 突破 CORS 限制的核心技巧
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        base64Data: base64Data,
                        fileName: generateFileName()
                    })
                });
                handleSuccess({ status: 'success', message: 'GitHub 遠端傳送指令已送出' });
            }
        } catch (e) {
            handleError(e);
        } finally {
            btn.disabled = false;
        }
    }

    function generateFileName() {
        return "Universe_Capture_" + new Date().getTime() + ".png";
    }

    function handleSuccess(res) {
        const log = document.getElementById('status-log');
        log.className = 'success';
        log.innerHTML = "✅ 傳送指令已送達！<br><small>請於 3-5 秒後檢查 Google Drive</small>";
    }

    function handleError(err) {
        const log = document.getElementById('status-log');
        log.className = 'error';
        log.innerText = "❌ 傳送失敗: " + err;
    }
</script>

</body>
</html>
