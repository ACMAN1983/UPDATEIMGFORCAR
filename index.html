<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SENTINEL v8.6-1 FULLSCREEN</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    :root { --neon: #00f3ff; --dark: #020617; }
    
    /* 亞原子級 CSS 修正：確保內容填滿整個視窗，包含安全區域 */
    html, body { height: 100vh; height: -webkit-fill-available; margin: 0; padding: 0; background: var(--dark); overflow: hidden; touch-action: none; }
    
    body { 
      font-family: 'Orbitron', sans-serif;
      display: flex; justify-content: center;
      /* env 函數避讓瀏海與底部導航 bar */
      padding-top: env(safe-area-inset-top); 
      padding-bottom: env(safe-area-inset-bottom);
    }

    .terminal-container { 
      width: 100%; max-width: 420px; 
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
      padding: 1.25rem; display: flex; flex-direction: column; position: relative;
    }

    #cam-box { 
      width: 100%; aspect-ratio: 9 / 15; /* 調整比例以適應全螢幕 */
      border-radius: 1.5rem; overflow: hidden; 
      border: 2px solid var(--neon); 
      box-shadow: 0 0 40px rgba(0,243,255,0.3); 
      position: relative; background: #000; 
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .scanline { width: 100%; height: 2px; background: var(--neon); opacity: 0.4; position: absolute; top: 0; animation: scan 4s linear infinite; }
    @keyframes scan { from { top: 0%; } to { top: 100%; } }

    .neon-btn { 
      background: var(--neon); color: #020617; font-weight: 900; 
      transition: 0.3s; text-transform: uppercase; letter-spacing: 5px;
      box-shadow: 0 0 20px var(--neon);
    }
    .neon-btn:active { transform: scale(0.96); filter: brightness(1.2); }

    #status-log { font-family: monospace; font-size: 10px; color: #2dd4bf; border-left: 2px solid var(--neon); padding-left: 10px; margin-top: 1rem; }
  </style>
</head>
<body class="touch-none overscroll-none">
  <div class="terminal-container">
    <div class="text-[8px] text-cyan-500/50 absolute top-4 right-6 tracking-widest">QUANTUM_MODE: v8.6</div>
    <h2 class="text-center text-cyan-400 mb-4 tracking-[0.5em] text-xl font-black italic">SENTINEL</h2>
    
    <div id="cam-box">
      <video id="v" playsinline autoplay muted></video>
      <div class="scanline"></div>
    </div>

    <div class="flex-1 flex flex-col justify-end space-y-4 mb-3">
      <div class="bg-slate-900/80 p-3 rounded-xl border border-slate-700 backdrop-blur-md">
        <p id="res-display" class="text-[10px] text-cyan-300 font-mono text-center">INITIALIZING QUANTUM LINK...</p>
      </div>
      <button onclick="captureAndSend()" id="mainBtn" class="neon-btn w-full py-6 rounded-2xl">EXECUTE UPLINK</button>
      <div id="status-log">>>> STANDBY</div>
    </div>
    <canvas id="snap" class="hidden"></canvas>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkZbPWIFP5fozNNNBmfTGU2YQkJr0uh6TkAOSRFCzPchDGYnRl63Jw8y3_pA9BLTh8hg/exec";
    const video = document.getElementById('v');
    const log = document.getElementById('status-log');

    // 註冊 PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }

    window.onload = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: 1920, height: 1080 }, audio: false 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          document.getElementById('res-display').innerText = `RAW: ${video.videoWidth}x${video.videoHeight} ( LOCKED )`;
          log.innerText = ">>> PWA SYSTEM ONLINE";
        };
      } catch (e) { log.innerText = ">>> ERR: " + e.message; }
    };

    async function captureAndSend() {
      // 擷取邏輯不變
      const canvas = document.getElementById('snap');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const base64 = canvas.toDataURL("image/jpeg", 0.75);
      log.innerText = ">>> TRANSMITTING...";
      await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ imageString: base64, fileName: `SEN_V86_${Date.now()}.jpg` }) });
      log.innerText = ">>> UPLINK_SUCCESS | " + new Date().toLocaleTimeString();
    }
  </script>
</body>
</html>
