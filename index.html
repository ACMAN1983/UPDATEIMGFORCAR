<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SENTINEL v8.0 CAMERA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    :root { --neon: #00f3ff; }
    body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; min-height: 100dvh; }
    .terminal-container { width: 100%; max-width: 420px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); padding: 1.5rem; display: flex; flex-direction: column; }
    
    /* 相機視窗樣式 */
    #cam-box { width: 100%; height: 280px; border-radius: 1rem; overflow: hidden; border: 2px solid var(--neon); box-shadow: 0 0 20px rgba(0,243,255,0.3); margin-bottom: 1.5rem; position: relative; background: #000; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(1); } /* 如果是自拍鏡頭可改用 scaleX(-1) */
    
    .scanline { width: 100%; height: 10px; background: linear-gradient(to bottom, transparent, var(--neon), transparent); opacity: 0.2; position: absolute; top: -10px; animation: scan 4s linear infinite; }
    @keyframes scan { from { top: -10%; } to { top: 110%; } }

    .neon-btn { background: var(--neon); color: #020617; font-weight: 900; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
    .neon-btn:hover { box-shadow: 0 0 25px var(--neon); transform: scale(1.02); }
    .neon-btn:active { transform: scale(0.98); }
    
    #status-log { font-family: monospace; font-size: 11px; color: #2dd4bf; border-left: 2px solid var(--neon); padding-left: 10px; margin-top: 1rem; min-height: 20px; }
    .flash-effect { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: white; } 100% { background: transparent; } }
  </style>
</head>
<body>
  <div class="terminal-container">
    <h2 class="text-center text-cyan-400 mb-4 tracking-[0.3em] font-black">SENTINEL HUB</h2>
    
    <div id="cam-box">
      <video id="v" playsinline autoplay muted></video>
      <div class="scanline"></div>
      <div class="absolute bottom-2 right-2 text-[9px] text-cyan-500 bg-black/50 px-2 py-1 rounded">UPLINK_READY</div>
    </div>

    <div class="flex-1 space-y-6">
      <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
        <p class="text-[10px] text-slate-500 mb-2 uppercase tracking-widest">Target Folder</p>
        <p class="text-xs text-cyan-200 truncate">Carlmglive / 1Hkh4Sa...VVO</p>
      </div>

      <button onclick="captureAndSend()" id="mainBtn" class="neon-btn w-full py-5 rounded-lg shadow-lg">
        Execute Capture
      </button>

      <div id="status-log">>>> WAITING_FOR_LINK</div>
    </div>

    <canvas id="snap" class="hidden"></canvas>
  </div>

  <script>
    /**
     * 配置區：請換成你最新部署的 GAS 網址
     */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkZbPWIFP5fozNNNBmfTGU2YQkJr0uh6TkAOSRFCzPchDGYnRl63Jw8y3_pA9BLTh8hg/exec";
    const video = document.getElementById('v');
    const log = document.getElementById('status-log');

    // 啟動相機通訊
    window.onload = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment" }, // 使用後鏡頭
          audio: false 
        });
        video.srcObject = stream;
        log.innerText = ">>> SAT-LINK ESTABLISHED";
      } catch (e) {
        log.innerText = ">>> CAM_AUTH_ERROR: " + e.message;
        log.style.color = "#f43f5e";
      }
    };

    async function captureAndSend() {
      const btn = document.getElementById('mainBtn');
      const camBox = document.getElementById('cam-box');
      
      btn.disabled = true;
      btn.style.opacity = "0.5";
      log.innerText = ">>> CAPTURING_IMAGE_DATA...";
      
      // 加入閃光視覺效果
      camBox.classList.add('flash-effect');
      setTimeout(() => camBox.classList.remove('flash-effect'), 300);

      try {
        const canvas = document.getElementById('snap');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // 壓縮影像 (0.7 品質在速度與解析度間最佳)
        const base64 = canvas.toDataURL("image/jpeg", 0.7);
        const fileName = "SENTINEL_" + new Date().getTime() + ".jpg";

        log.innerText = ">>> SYNCING_TO_CLOUD...";

        // 跨域傳送
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            imageString: base64,
            fileName: fileName
          })
        });

        log.innerText = ">>> UPLINK_SUCCESS: " + new Date().toLocaleTimeString();
        log.style.color = "#2dd4bf";
      } catch (e) {
        log.innerText = ">>> TRANSMISSION_FAILED";
        log.style.color = "#f43f5e";
      } finally {
        btn.disabled = false;
        btn.style.opacity = "1";
      }
    }
  </script>
</body>
</html>
