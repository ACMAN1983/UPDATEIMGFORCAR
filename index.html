<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SENTINEL v8.5.2 PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    :root { --neon: #00f3ff; --dark-bg: #020617; }
    body { background: var(--dark-bg); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; min-height: 100dvh; }
    .terminal-container { width: 100%; max-width: 420px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); padding: 1.25rem; display: flex; flex-direction: column; position: relative; }
    
    /* 頂部版號裝飾 */
    .version-tag { position: absolute; top: 10px; right: 15px; font-size: 8px; color: var(--neon); opacity: 0.6; letter-spacing: 1px; }

    #cam-box { 
      width: 100%; 
      aspect-ratio: 9 / 12; 
      border-radius: 1rem; 
      overflow: hidden; 
      border: 2px solid var(--neon); 
      box-shadow: 0 0 25px rgba(0,243,255,0.2); 
      margin-bottom: 1rem; 
      position: relative; 
      background: #000; 
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    /* 動態掃描線 */
    .scanline { width: 100%; height: 2px; background: var(--neon); opacity: 0.4; position: absolute; top: 0; animation: scan 3s linear infinite; pointer-events: none; }
    @keyframes scan { from { top: 0%; } to { top: 100%; } }

    .neon-btn { background: var(--neon); color: #020617; font-weight: 900; transition: all 0.3s; text-transform: uppercase; letter-spacing: 3px; }
    .neon-btn:hover { box-shadow: 0 0 30px var(--neon); filter: brightness(1.1); }
    .neon-btn:active { transform: scale(0.96); }
    
    #status-log { font-family: monospace; font-size: 10px; color: #2dd4bf; border-left: 2px solid var(--neon); padding-left: 10px; margin-top: 1rem; min-height: 15px; }
    .flash { animation: flashEffect 0.2s ease-out; }
    @keyframes flashEffect { 0% { opacity: 1; } 50% { opacity: 0.5; background: #fff; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="terminal-container">
    <div class="version-tag">BUILD ID: v8.5.2 PRO</div>
    
    <h2 class="text-center text-cyan-400 mb-3 tracking-[0.4em] text-lg font-black italic">SENTINEL</h2>
    
    <div id="cam-box">
      <video id="v" playsinline autoplay muted></video>
      <div class="scanline"></div>
      <div class="absolute bottom-2 left-2 flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
        <span class="text-[8px] text-cyan-500 font-bold">REC-STREAM</span>
      </div>
    </div>

    <div class="flex-1 space-y-4">
      <div class="bg-slate-900/90 p-3 rounded-lg border border-slate-700 backdrop-blur-sm">
        <div class="flex justify-between items-center mb-1">
          <p class="text-[9px] text-slate-500 uppercase tracking-widest">Hardware Sync</p>
          <span class="text-[8px] px-1 bg-cyan-900 text-cyan-300 rounded">ENCRYPTED</span>
        </div>
        <p id="res-display" class="text-xs text-cyan-300 font-mono">INITIALIZING INTERFACE...</p>
      </div>

      <button onclick="captureAndSend()" id="mainBtn" class="neon-btn w-full py-5 rounded-xl shadow-2xl">
        EXECUTE UPLINK
      </button>

      <div id="status-log">>>> LINK_STANDBY</div>
    </div>

    <canvas id="snap" class="hidden"></canvas>
  </div>

  <script>
    /**
     * 終端配置：請確保此處為最新部署的 GAS 網址
     */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkbZBPWlFP5fozNNNBmfTGU2YQkjr0uh6TKAOSRFCzPchDGYnRl63Jw8y3_pA9BLTh8hg/exec";
    const video = document.getElementById('v');
    const log = document.getElementById('status-log');
    const resDisp = document.getElementById('res-display');

    window.onload = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false 
        });
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
          // 動態讀取硬體參數，修正比例
          resDisp.innerText = `RAW_BUF: ${video.videoWidth}x${video.videoHeight} @ 1.0 ASPECT`;
          log.innerText = ">>> SAT-LINK STABLE | v8.5.2";
        };
      } catch (e) {
        log.innerText = ">>> INTERFACE_FAILURE: " + e.message;
        log.style.color = "#ff4444";
      }
    };

    async function captureAndSend() {
      const btn = document.getElementById('mainBtn');
      const camBox = document.getElementById('cam-box');
      const canvas = document.getElementById('snap');
      
      btn.disabled = true;
      log.innerText = ">>> CAPTURING_QUANTUM_STREAM...";
      camBox.classList.add('flash');
      setTimeout(() => camBox.classList.remove('flash'), 200);

      try {
        // 核心比例同步邏輯
        const w = video.videoWidth;
        const h = video.videoHeight;
        canvas.width = w;
        canvas.height = h;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);
        
        // 生成傳輸用 Base64
        const base64 = canvas.toDataURL("image/jpeg", 0.75);
        const fileName = `SENTINEL_V852_${Date.now()}.jpg`;

        log.innerText = ">>> TRANSMITTING_TO_DRIVE...";

        // 跨域 POST 傳送 (使用 no-cors 模式)
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ imageString: base64, fileName: fileName })
        });

        log.innerText = ">>> UPLINK_SUCCESS | " + new Date().toLocaleTimeString();
        log.style.color = "#2dd4bf";
      } catch (e) {
        log.innerText = ">>> UPLINK_CRITICAL_ERR";
        log.style.color = "#ff4444";
      } finally {
        setTimeout(() => { btn.disabled = false; }, 1000);
      }
    }
  </script>
</body>
</html>
