<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SENTINEL v9.6 PRO</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    :root { --neon: #00f3ff; --alert: #ff0055; --dark: #020617; }
    html, body { height: 100vh; height: -webkit-fill-available; margin: 0; padding: 0; background: var(--dark); overflow: hidden; touch-action: none; }
    body { font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
    .terminal-container { width: 100%; max-width: 420px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); padding: 1rem; display: flex; flex-direction: column; position: relative; }
    #cam-box { width: 100%; aspect-ratio: 9 / 14; border-radius: 1.5rem; overflow: hidden; border: 2px solid var(--neon); box-shadow: 0 0 30px rgba(0,243,255,0.25); position: relative; background: #000; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .neon-select { background: #111827; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; outline: none; appearance: none; text-align: center; }
    .neon-btn { background: var(--neon); color: #020617; font-weight: 900; transition: 0.3s; text-transform: uppercase; letter-spacing: 4px; box-shadow: 0 0 15px var(--neon); }
    .neon-btn.active { background: var(--alert); box-shadow: 0 0 20px var(--alert); color: white; }
    #status-log { font-family: monospace; font-size: 10px; color: #2dd4bf; border-left: 2px solid var(--neon); padding-left: 10px; min-height: 15px; }
    .flash { animation: f 0.2s ease-out; }
    @keyframes f { 0% { opacity: 1; } 50% { opacity: 0.5; background: #fff; } 100% { opacity: 1; } }
  </style>
</head>
<body class="overscroll-none">
  <div class="terminal-container">
    <div class="text-[8px] text-cyan-500/50 absolute top-4 right-6 tracking-widest">UPLINK_v9.6_PRO</div>
    <h2 class="text-center text-cyan-400 mb-2 tracking-[0.5em] text-lg font-black italic">SENTINEL</h2>
    
    <div id="cam-box">
      <video id="v" playsinline autoplay muted></video>
      <div class="absolute bottom-2 left-2 flex items-center gap-2">
        <div id="pulse" class="w-2 h-2 rounded-full bg-cyan-500"></div>
        <span class="text-[8px] text-cyan-500 font-bold">CORE_LINK</span>
      </div>
    </div>

    <div class="flex-1 flex flex-col justify-end space-y-3 mb-2">
      <div class="grid grid-cols-2 gap-2 text-center">
        <div class="bg-slate-900/80 p-2 rounded-xl border border-slate-700">
          <p class="text-[8px] text-slate-500 uppercase">Speed</p>
          <p id="disp-speed" class="text-lg text-cyan-300 font-bold">0 <span class="text-[10px]">km/h</span></p>
        </div>
        <div class="bg-slate-900/80 p-2 rounded-xl border border-slate-700">
          <p class="text-[8px] text-slate-500 uppercase">Accuracy</p>
          <p id="disp-acc" class="text-lg text-cyan-300 font-bold">-- <span class="text-[10px]">m</span></p>
        </div>
      </div>

      <select id="carId" class="neon-select">
        <option value="RED-0938">RED-0938</option>
        <option value="RDH-1983">RDH-1983</option>
        <option value="RDE-8679">RDE-8679</option>
      </select>

      <button onclick="toggleAuto()" id="mainBtn" class="neon-btn w-full py-5 rounded-2xl">Execute Quantum Sync</button>
      <div id="status-log">>>> STANDBY</div>
    </div>
    <canvas id="snap" class="hidden"></canvas>
  </div>

  <script>
    // --- 務必確認這是最新的 /exec 網址 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxkZbPWIFP5fozNNNBmfTGU2YQkJr0uh6TkAOSRFCzPchDGYnRl63Jw8y3_pA9BLTh8hg/exec";
    const video = document.getElementById('v');
    const log = document.getElementById('status-log');
    const btn = document.getElementById('mainBtn');
    let timer = null;
    let currentGPS = { lat: 0, lng: 0, speed: 0, accuracy: 0 };

    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));

    window.onload = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
        video.srcObject = stream;
        navigator.geolocation.watchPosition(pos => {
          currentGPS = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            speed: pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0,
            accuracy: Math.round(pos.coords.accuracy)
          };
          document.getElementById('disp-speed').innerHTML = `${currentGPS.speed} <span class="text-[10px]">km/h</span>`;
          document.getElementById('disp-acc').innerHTML = `${currentGPS.accuracy} <span class="text-[10px]">m</span>`;
        }, null, { enableHighAccuracy: true });
        log.innerText = ">>> SAT-LINK ESTABLISHED";
      } catch (e) { log.innerText = ">>> ERR: " + e.message; }
    };

    function toggleAuto() {
      if (timer) {
        clearInterval(timer); timer = null;
        btn.innerText = "Execute Quantum Sync";
        btn.classList.remove('active');
        document.getElementById('pulse').classList.remove('animate-pulse', 'bg-red-500');
        log.innerText = ">>> UPLINK TERMINATED";
      } else {
        syncAll();
        timer = setInterval(syncAll, 5000); // 5秒循環
        btn.innerText = "Terminate Link";
        btn.classList.add('active');
        document.getElementById('pulse').classList.add('animate-pulse', 'bg-red-500');
        log.innerText = ">>> AUTO SYNC ACTIVE (5S)";
      }
    }

    async function syncAll() {
      const canvas = document.getElementById('snap');
      document.getElementById('cam-box').classList.add('flash');
      setTimeout(() => document.getElementById('cam-box').classList.remove('flash'), 200);

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      const payload = {
        gps: { carId: document.getElementById('carId').value, ...currentGPS },
        imageString: canvas.toDataURL("image/jpeg", 0.6)
      };

      try {
        // 使用 no-cors 突破 403 阻礙
        await fetch(GAS_URL, { 
          method: "POST", 
          mode: "no-cors", 
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload) 
        });
        log.innerText = `>>> SYNC_SENT | ${new Date().toLocaleTimeString()}`;
      } catch (e) { log.innerText = ">>> UPLINK_SYNC_ERR"; }
    }
  </script>
</body>
</html>
