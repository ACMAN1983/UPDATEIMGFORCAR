<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SENTINEL v7.0 ULTRA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    :root { --neon: #00f3ff; }
    body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; min-height: 100dvh; }
    .terminal-container { width: 100%; max-width: 420px; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); padding: 1.5rem; display: flex; flex-direction: column; }
    #cam-box { width: 100%; height: 220px; border-radius: 1rem; overflow: hidden; border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(0,243,255,0.2); margin-bottom: 1rem; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .speed-gauge { width: 180px; height: 180px; margin: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px double var(--neon); border-radius: 50%; transition: 0.3s; }
    .speed-value { font-size: 70px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    .neon-select { background: #111827; border: 1px solid #374151; color: var(--neon); width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
    #status-log { font-family: monospace; font-size: 10px; color: #2dd4bf; height: 40px; overflow: hidden; border-left: 2px solid var(--neon); padding-left: 10px; margin-top: 1rem; }
    .sync-flash { animation: flash 0.5s ease; }
    @keyframes flash { 50% { background: rgba(0, 243, 255, 0.3); box-shadow: 0 0 40px var(--neon); } }
  </style>
</head>
<body>
  <div class="terminal-container" id="main-ui">
    <div id="cam-box">
        <video id="v" playsinline autoplay muted></video>
        <div class="absolute top-2 left-2 px-2 py-0.5 bg-black/50 border border-cyan-500 rounded text-[9px] text-cyan-400">SAT-LINK ACTIVE</div>
    </div>

    <div class="flex-1 flex flex-col justify-center text-center">
      <div class="speed-gauge" id="gauge">
        <div id="current-speed" class="speed-value">0</div>
        <div class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">KM/H</div>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-8 text-[11px] text-cyan-600 font-bold uppercase">
        <div>Lat: <span id="disp-lat" class="text-white font-mono">0.0000</span></div>
        <div>Lng: <span id="disp-lng" class="text-white font-mono">0.0000</span></div>
      </div>
    </div>

    <div class="space-y-3 bg-gray-900/40 p-4 rounded-xl border border-gray-800">
      <div class="flex gap-2">
        <select id="carId" class="neon-select flex-1"><option>SYNCING...</option></select>
        <select id="videoSource" class="neon-select flex-1"></select>
      </div>
      <button onclick="engage()" id="mainBtn" class="w-full py-4 bg-cyan-400 text-black font-black rounded-lg uppercase tracking-widest active:scale-95 transition-all">Engage Link</button>
      <div id="status-log">>>> WAITING FOR COMMAND</div>
    </div>
    <canvas id="snap" class="hidden"></canvas>
  </div>

  <script>
    // --- 重要：填入你的 GAS 部署網址 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxUbS-8ns3NLHM9py4EkGerccaFIlQAqZT3ETuisCnIB1UvagoHlHR_iaZHWtKmCOVR/exec";

    window.onload = async () => {
      try {
        // 初始權限請求
        await navigator.mediaDevices.getUserMedia({ video: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const vSel = document.getElementById('videoSource');
        devices.filter(d => d.kind === 'videoinput').forEach((d, i) => vSel.add(new Option(d.label || `CAM ${i+1}`, d.deviceId)));
        
        // 從 GAS 抓取車輛清單
        const res = await fetch(GAS_URL);
        const names = await res.json();
        const carSel = document.getElementById('carId');
        carSel.innerHTML = '';
        if(names && names.length > 0 && names[0] !== "HUB_ERR") {
            names.forEach(n => carSel.add(new Option(n, n)));
        } else {
            carSel.add(new Option("DEFAULT_CAR", "DEFAULT_CAR"));
        }
        document.getElementById('status-log').innerText = ">>> UPLINK ESTABLISHED";
      } catch (e) { document.getElementById('status-log').innerText = ">>> HUB ERR: " + e.message; }
    };

    async function engage() {
      const devId = document.getElementById('videoSource').value;
      const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: devId } } });
      document.getElementById('v').srcObject = stream;
      
      const btn = document.getElementById('mainBtn');
      btn.disabled = true;
      btn.innerText = "LINKING...";
      btn.style.background = "#1e293b";
      btn.style.color = "#475569";
      
      startSync();
    }

    function startSync() {
      const carId = document.getElementById('carId').value;
      const log = document.getElementById('status-log');
      const gauge = document.getElementById('gauge');

      navigator.geolocation.watchPosition(async pos => {
        const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
        document.getElementById('current-speed').innerText = speed;
        document.getElementById('disp-lat').innerText = pos.coords.latitude.toFixed(4);
        document.getElementById('disp-lng').innerText = pos.coords.longitude.toFixed(4);

        // 影像抓取：320x240，中等品質以優化傳輸速度
        const video = document.getElementById('v');
        const canvas = document.getElementById('snap');
        canvas.width = 320; canvas.height = 240;
        canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
        const base64 = canvas.toDataURL("image/jpeg", 0.4);

        // 執行跨域 POST 上傳
        fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors", // 核心突破技術
          body: JSON.stringify({
            data: { carId, lat: pos.coords.latitude, lng: pos.coords.longitude, speed, accuracy: pos.coords.accuracy },
            imageString: base64
          })
        })
        .then(() => {
          log.innerText = ">>> DATA SYNCED | " + new Date().toLocaleTimeString();
          gauge.classList.add('sync-flash');
          setTimeout(() => gauge.classList.remove('sync-flash'), 500);
        })
        .catch(e => { log.innerText = ">>> SYNC FAILED"; });

      }, (err) => {
          log.innerText = ">>> GPS ERR: " + err.message;
      }, { enableHighAccuracy: true });
    }
  </script>
</body>
</html>
